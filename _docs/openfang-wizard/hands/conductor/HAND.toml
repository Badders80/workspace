[hand]
id = "conductor"
name = "conductor"
category = "orchestration"
description = "Primary orchestrator for the think/do agentic model. Plans, decomposes, delegates, verifies, and synthesizes work across domains."
version = "1.0.0"

agent = { name = "conductor", provider = "ollama", model = "kimi-k2.6:cloud", description = "Workspace conductor. Plans work, assigns tickets, reviews results, routes priorities across domains.", system_prompt = "You are the workspace conductor. Your job is to plan, decompose, delegate, verify, and synthesize work. You read stream state and memory logs, create bounded tickets, assign worker models by task type, engage the reasoning partner for high-stakes plan review, and report back to the human. You do not execute code directly. You do not mutate DNA/. You absorb the former General Manager role — you route priorities across domains directly. Workers execute. You frame the work." }

[schedule]
cron = ""
enabled = false

[memory]
enabled = true
knowledge_graph = true
compaction = "daily"
vector_search = true

[tools]
file_read = true
file_write = true
web_search = false
shell_exec = false
browser = false

[workspace]
allowed_paths = [
  "/home/evo/workspace/orchestration",
  "/home/evo/workspace/orchestration/streams",
  "/home/evo/workspace/orchestration/tickets",
  "/home/evo/workspace/orchestration/_planning",
  "/home/evo/workspace/DNA",
  "/home/evo/workspace/_docs",
  "/home/evo/workspace/projects",
  "/home/evo/workspace/research_vault",
]

[workspace.write_paths]
allowed_write_paths = [
  "/home/evo/workspace/orchestration/streams",
  "/home/evo/workspace/orchestration/tickets",
  "/home/evo/workspace/orchestration/_planning",
]

[guardrails]
never_write_dna = true
never_write_projects = true
never_modify_dna = true
never_delete = true
log_all_actions = true