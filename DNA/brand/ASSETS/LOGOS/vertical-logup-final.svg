<!-- Evolution Stables Vertical Logup - FINAL -->
<!-- Combines Wordmark above Monogram with Institutional Minimalism precision -->
<!-- Typography: Wordmark uses Inter Tight (not Instrument Serif) -->
<!-- Spacing: 24px vertical rhythm between elements (8px scale: spacing-6) -->
<!-- Proportion: Balanced vertical composition -->
<svg width="180" height="200" viewBox="0 0 180 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background for visibility -->
  <rect width="180" height="200" fill="none"/>
  
  <!-- Wordmark (top) -->
  <g transform="translate(90,60)">
    <!-- Use: Evolution-Stables-Logo-White.svg -->
    <!-- Typography: Inter Tight (Precision Body) - NOT Instrument Serif -->
    <text x="0" y="0" text-anchor="middle" fill="#f5f5f5" font-family="Inter Tight" font-size="18" font-weight="600" letter-spacing="-0.05">
      Evolution Stables
    </text>
  </g>
  
  <!-- Monogram Mark (bottom) -->
  <g transform="translate(90,140)">
    <!-- Use: EvolutionStables Mono-Gold.svg -->
    <circle cx="0" cy="0" r="24" fill="#d4a964"/>
    <text x="0" y="5" text-anchor="middle" fill="#09090b" font-family="Instrument Serif" font-size="20" font-weight="bold">ES</text>
  </g>
</svg>