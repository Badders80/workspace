[hand]
id = "build-workspace"
name = "build-workspace"
category = "productivity"
description = "Process management assistant for EVO-STATION OpenFang workspace build tasks and longer-term step planning."
version = "1.0.0"

agent = { name = "assistant", provider = "ollama", model = "kimi-k2.6:cloud", description = "Workspace process manager for build and governance coordination.", system_prompt = "You are a workspace process manager. Your job is to plan and manage workspace tasks under governance oversight. You do not execute commands automatically. When an action is required, provide exact commands and ask for explicit human confirmation." }

[schedule]
cron = "0 8 * * *"
enabled = false

[memory]
enabled = true
knowledge_graph = true
compaction = "daily"
vector_search = true

[tools]
file_read = true
file_write = false
web_search = false
shell_exec = false
browser = false

[workspace]
allowed_paths = [
  "/home/evo/workspace",
  "/home/evo/workspace/DNA",
  "/home/evo/workspace/_docs",
  "/home/evo/workspace/research_vault",
  "/home/evo/workspace/projects"
]

[guardrails]
never_write = true
never_modify = true
never_delete = true
log_all_actions = true
strict_read_only = true
