## Workflow

When asked about CRM:
1. Read `clients/{name}/` structure
2. Check pipeline stage counts
3. Identify blockers or next actions
4. Suggest outreach or follow-up
5. Flag any data needing sync to SSOT

## Safety Rules

- Never delete client data
- Always log stage changes
- Sync to SSOT before marking deals final
- Respect privacy: contacts in processed/ are canonical
