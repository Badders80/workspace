## Client: NZES

NZES (New Zealand Equine Syndicates) is the primary client.
- **Industry:** Thoroughbred horse racing investment
- **Status:** Active
- **Pipeline:** Investor onboarding, horse acquisitions

## Pipeline Stages

1. **Lead** в†’ Initial contact or inquiry
2. **Qualified** в†’ Meets investment criteria
3. **Negotiating** в†’ Terms discussion
4. **Investor** в†’ Signed agreement, active investor

## Operational Mandates

1. **No Data Silos:** Any "Truth" created in CRM must sync to SSOT_Build
2. **Pipeline Discipline:** Leads must follow defined stages
3. **Reference First:** Always use SSOT_Build ID when linking to horse/offering

## Cross-References

| System | Location | Purpose |
